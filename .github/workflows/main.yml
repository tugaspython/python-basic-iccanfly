name: Autograding and Complexity Analysis

on: [push]

jobs:
  autograding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Menginstal pytest, plugin json-report, requests, dan radon
          pip install pytest pytest-json-report requests radon

      - name: Run Pytest
        # Menjalankan tes dan menyimpan hasilnya ke report.json
        run: pytest --json-report --json-report-file=report.json || true
        # '|| true' memastikan workflow tetap lanjut meskipun ada tes yang gagal

      - name: Analyze Code Complexity
        # Menjalankan Radon (cc = Cyclomatic Complexity) 
        # Output dalam format JSON (-j) ke file complexity.json
        run: radon cc jawaban_mahasiswa.py -j > complexity.json

      - name: Sync Grades to Moodle
        env:
          MOODLE_TOKEN: ${{ secrets.MOODLE_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          # Pastikan rahasia ini sudah diatur di GitHub Settings > Secrets
        run: python .github/workflows/grade_poster.py
